<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-[var(--bg-color)]">
  {{ partial "header.html" . }}
  {{ if .IsHome }}
    <main class="flex-1">
      {{ block "main" . }}{{ end }}
    </main>
  {{ else }}
    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 py-8">
      {{ block "main" . }}{{ end }}
    </main>
  {{ end }}
  <footer class="mt-auto border-t border-gray-200 bg-white">
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
