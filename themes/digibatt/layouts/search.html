{{ define "main" }}
<div>
  <h1 class="text-3xl font-bold text-gray-900 mb-6">{{ .Title }}</h1>

  <!-- Search input -->
  <div class="relative max-w-xl mb-8">
    <input id="search-input-page" type="search" placeholder="Search records…" autocomplete="off"
           class="w-full pl-10 pr-4 py-2.5 text-base border border-gray-300 rounded-full bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
  </div>

  <!-- Results container -->
  <div id="search-results-page" class="flex flex-col gap-4">
    <p class="text-gray-500 text-sm">Enter a search term above to find records.</p>
  </div>
</div>
{{ end }}
