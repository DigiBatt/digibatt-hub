{{ define "main" }}
  <h1 class="text-3xl font-bold mb-6">{{ .Title }}</h1>
  {{ .Content }}
  <div class="grid gap-6 mt-6">
    {{ range .Pages }}
      <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-2">
          <a href="{{ .RelPermalink }}" class="text-primary hover:text-secondary">{{ .Title }}</a>
        </h2>
        {{ with .Params.description }}
          <p class="text-gray-600 mb-2">{{ . }}</p>
        {{ end }}
        {{ with .Params.repo }}
          <a href="{{ . }}" class="text-sm text-primary hover:underline">View Repository →</a>
        {{ end }}
      </div>
    {{ end }}
  </div>
{{ end }}
