baseURL = 'https://digibatt.org/'
locale = 'en-uk'
title = 'DigiBatt Hub'
theme = 'digibatt'


[menus]
  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 10

  [[menus.main]]
    name = 'Contact'
    pageRef = '/contact'
    weight = 20

  [[menus.main]]
    name = 'Search'
    pageRef = '/tags'
    weight = 30

  [[menus.main]]
    name = 'Submit'
    pageRef = '/submit'
    weight = 40




[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
