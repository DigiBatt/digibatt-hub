baseURL = 'https://digibatt.org/'
languageCode = 'en-GB'
title = 'DigiBatt Hub'
theme = 'digibatt'

[outputs]
  home = ['HTML', 'JSON']

[menus]

 [[menus.main]]
    name = 'Resources'
    weight = 10
    identifier = 'resources'

  [[menus.main]]
    name = 'Cyclic Testing'
    pageRef = '/cyclic-testing'
    weight = 11
    parent = 'resources'

  [[menus.main]]
    name = 'Data Repositories'
    pageRef = '/data-repositories'
    weight = 12
    parent = 'resources'

  [[menus.main]]
    name = 'Data Standardisation'
    pageRef = '/data-standardisation'
    weight = 13
    parent = 'resources'

  [[menus.main]]
    name = 'Simulation'
    pageRef = '/simulation'
    weight = 14
    parent = 'resources'

  [[menus.main]]
    name = 'System Level Testing'
    pageRef = '/system-level-testing'
    weight = 15
    parent = 'resources'

  [[menus.main]]
    name = 'About'
    pageRef = '/pages/about'
    weight = 60

  [[menus.main]]
    name = 'Contact'
    pageRef = '/pages/contact'
    weight = 70

  [[menus.main]]
    name = 'Submit'
    url = 'https://github.com/FrancescaWatson/digibatt-hub-hugo/issues/new/choose'
    weight = 80

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'


[module]
  [[module.mounts]]
    source = 'content'
    target = 'content'

  [[module.mounts]]
    source = 'assets'
    target = 'assets'

  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

  [module.hugoVersion]
    extended = false
    min = '0.146.0'
