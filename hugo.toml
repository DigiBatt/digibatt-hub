baseURL = 'https://digibatt.org/'
locale = 'en-uk'
title = 'DigiBatt Hub'
theme = 'digibatt'

[outputs]
  home = ['HTML', 'JSON']

[menus]

  [[menus.main]]
    name = 'Software'
    pageRef = '/software'
    weight = 10

  [[menus.main]]
    name = 'Publications'
    pageRef = '/publications'
    weight = 20

  [[menus.main]]
    name = 'Datasets'
    pageRef = '/datasets'
    weight = 30

  [[menus.main]]
    name = 'Databases'
    pageRef = '/databases'
    weight = 40

  [[menus.main]]
    name = 'Tutorials'
    pageRef = '/tutorials'
    weight = 50

  [[menus.main]]
    name = 'About'
    pageRef = '/pages/about'
    weight = 60

  [[menus.main]]
    name = 'Contact'
    pageRef = '/pages/contact'
    weight = 70

  [[menus.main]]
    name = 'Submit'
    url = 'https://github.com/FrancescaWatson/digibatt-hub-hugo/issues/new/choose'
    weight = 80

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'


[module]
  [[module.mounts]]
    source = 'content'
    target = 'content'

  [[module.mounts]]
    source = 'assets'
    target = 'assets'

  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

  [module.hugoVersion]
    extended = false
    min = '0.146.0'
